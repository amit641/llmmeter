name: Update pricing

on:
  schedule:
    # Every Monday 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Refresh model prices
        run: node scripts/update-pricing.mjs

      - name: Run tests with new prices
        run: pnpm --filter llmmeter-core test

      - name: Create changeset
        run: |
          mkdir -p .changeset
          cat > .changeset/pricing-update.md <<'EOF'
          ---
          "llmmeter-core": patch
          ---

          Refresh bundled model price table (weekly automated update).
          EOF

      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: weekly pricing update"
          branch: chore/weekly-pricing-update
          delete-branch: true
          title: "chore: weekly pricing update"
          body: |
            Automated weekly refresh of `PRICE_TABLE` in `llmmeter-core` based on
            the upstream LiteLLM price registry.

            Please review the diff and merge if the changes look reasonable.
          labels: |
            automated
            pricing
